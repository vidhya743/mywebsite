<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        header{
            background:#007bff;
            color:white;
            text-align:center;
            padding:20px;
        }

        nav{
            background:#333;
            padding:10px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:15px;
        }

        .container{
            width:80%;
            margin:30px auto;
            text-align:center;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        button{
            background:#28a745;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
            margin-top:15px;
        }

        button:hover{
            background:#218838;
        }

        footer{
            background:#333;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:30px;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Website</h1>
    <p>HTML & CSS Demo Project</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <div class="card">
        <h2>Hello!</h2>
        <p>This is a simple and attractive webpage using HTML and CSS.</p>
        <button>Learn More</button>
    </div>
</div>

<footer>
    <p>© 2026 My Website. All Rights Reserved.</p>
</footer>

</body>
</html>
